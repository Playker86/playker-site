<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playbox Hub</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0a0a0a,#111827);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container {
  text-align:center;
}

h1 {
  margin-bottom:40px;
  font-size:34px;
}

.buttons {
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn {
  width:280px;
  height:160px;
  border-radius:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
  gap:10px;
}

/* Logos */
.logo {
  width:50px;
  height:50px;
  object-fit:contain;
}

/* Xbox */
.xbox {
  background: linear-gradient(135deg,#107C10,#5ac800);
  color:#000;
  box-shadow:0 10px 30px rgba(16,124,16,0.4);
}

/* PlayStation */
.ps {
  background: linear-gradient(135deg,#003791,#00aaff);
  color:#fff;
  box-shadow:0 10px 30px rgba(0,55,145,0.4);
}

.btn:hover {
  transform:scale(1.08);
}

</style>
</head>

<body>

<div class="container">
  <h1>🎮 Выберите платформу</h1>

  <div class="buttons">
    <a href="https://playbox-xbox.github.io/playbox_store/" class="btn xbox">
      <img src="https://logodix.com/logo/858450.png" class="logo">
      XBOX
    </a>

    <a href="https://playker86.github.io/playbox_store-Playstation/" class="btn ps">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg" class="logo">
      PLAYSTATION
    </a>
  </div>
</div>

</body>
</html>
